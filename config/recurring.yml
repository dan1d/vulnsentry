# examples:
#   periodic_cleanup:
#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  refresh_branch_targets:
    class: RefreshBranchTargetsJob
    schedule: every day at 2am

  # Open PRs need fresh data - sync frequently
  sync_open_pull_requests:
    class: SyncPullRequestsJob
    args: [{ scope: "open" }]
    schedule: every 5 minutes

  # Closed/merged PRs rarely change - sync less often
  sync_closed_pull_requests:
    class: SyncPullRequestsJob
    args: [{ scope: "closed" }]
    schedule: every 6 hours

  evaluate_osv_vulnerabilities:
    class: EvaluateOsvVulnerabilitiesJob
    schedule: every day at 3am

  # Re-evaluate PatchBundles awaiting a fix version
  reevaluate_awaiting_fix:
    class: ReevaluateAwaitingFixJob
    schedule: every day at 4am

  cleanup_fork_branches:
    class: CleanupForkBranchesJob
    schedule: every hour at minute 25

